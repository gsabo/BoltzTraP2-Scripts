     text-anchor="middle">
    <!-- "Boltz" -->
    <text x="490" y="425" font-size="300" fill="#137EBB">
      Boltz
    </text>
    <!-- "TraP2" -->
    <text x="490" y="750" font-size="250" fill="#848485">
      TraP2
    </text>
